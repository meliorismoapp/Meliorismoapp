<script>
const { useState, useEffect, useRef, useCallback, useMemo } = React;
/* ═══════════════════════════════════════════════════════════════
   SISTEMA DE AUDIO — High Ticket · Web Audio API
   Sonidos de precisión: clicks mecánicos, tones cristalinos,
   swooshes suaves. Sin archivos externos.
═══════════════════════════════════════════════════════════════ */
const AudioSystem = (() => {
    let ctx = null;
    let enabled = true;
    const getCtx = () => {
        if (!ctx) {
            try {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            catch (e) { }
        }
        if (ctx && ctx.state === 'suspended')
            ctx.resume();
        return ctx;
    };
    // Nodo maestro de ganancia (volumen global)
    let masterGain = null;
    const getMaster = () => {
        const c = getCtx();
        if (!c)
            return null;
        if (!masterGain) {
            masterGain = c.createGain();
            masterGain.gain.value = 0.38;
            masterGain.connect(c.destination);
        }
        return masterGain;
    };
    // Oscilador de tono puro con envolvente ADSR
    const tone = (freq, type, duration, gainPeak, attackT, decayT, sustainLvl, releaseT) => {
        if (!enabled)
            return;
        const c = getCtx();
        const m = getMaster();
        if (!c || !m)
            return;
        const now = c.currentTime;
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(gainPeak, now + (attackT || 0.004));
        g.gain.linearRampToValueAtTime((sustainLvl || 0.3) * gainPeak, now + (attackT || 0.004) + (decayT || 0.06));
        g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(g);
        g.connect(m);
        osc.start(now);
        osc.stop(now + duration + (releaseT || 0.02));
    };
    // Ruido blanco filtrado (para swishes y clicks mecánicos)
    const noise = (duration, filterFreq, filterQ, gainPeak, attack, decay) => {
        if (!enabled)
            return;
        const c = getCtx();
        const m = getMaster();
        if (!c || !m)
            return;
        const now = c.currentTime;
        const bufLen = c.sampleRate * duration;
        const buf = c.createBuffer(1, bufLen, c.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++)
            data[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const bpf = c.createBiquadFilter();
        bpf.type = 'bandpass';
        bpf.frequency.value = filterFreq || 4000;
        bpf.Q.value = filterQ || 1.5;
        const g = c.createGain();
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(gainPeak || 0.6, now + (attack || 0.003));
        g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        src.connect(bpf);
        bpf.connect(g);
        g.connect(m);
        src.start(now);
        src.stop(now + duration + 0.01);
    };
    // ── SONIDOS INDIVIDUALES ──────────────────────────────────────
    const sounds = {
        // Navegación entre tabs — click mecánico de precisión (tipo selector de BMW)
        tab: () => {
            noise(0.055, 3800, 2.5, 0.5, 0.002, 0.055);
            tone(1100, 'sine', 0.08, 0.18, 0.003, 0.02, 0.1, 0.06);
        },
        // Check-in diario — doble tono ascendente cristalino (confirmación Apple)
        checkin: () => {
            tone(880, 'sine', 0.18, 0.55, 0.004, 0.05, 0.3, 0.14);
            setTimeout(() => tone(1320, 'sine', 0.22, 0.45, 0.004, 0.06, 0.25, 0.16), 110);
        },
        // Registrar intensidad — click seco + tono bajo (selector de Porsche)
        register: () => {
            noise(0.04, 5500, 3.5, 0.7, 0.001, 0.04);
            tone(440, 'sine', 0.12, 0.22, 0.004, 0.04, 0.2, 0.08);
        },
        // Abrir modal de patrón — swoosh suave descendente (apertura de puerta luxury)
        modalOpen: () => {
            tone(900, 'sine', 0.25, 0.28, 0.01, 0.08, 0.15, 0.16);
            tone(600, 'sine', 0.28, 0.18, 0.02, 0.1, 0.1, 0.18);
            noise(0.12, 2000, 0.8, 0.2, 0.01, 0.12);
        },
        // Cerrar modal — swoosh reverso ascendente
        modalClose: () => {
            tone(500, 'sine', 0.16, 0.2, 0.005, 0.06, 0.1, 0.1);
            tone(750, 'sine', 0.14, 0.14, 0.01, 0.07, 0.08, 0.09);
            noise(0.09, 2500, 1, 0.15, 0.005, 0.09);
        },
        // Neutralizar patrón — acorde de confirmación premium (3 notas, Apple Watch rings)
        neutralize: () => {

const PROPENSIONS = [
    { id: 1, name: 'Propensión al Engaño', desc: 'Responde a dos estados: ignorancia de la malicia ajena, que lleva a confiar ingenuamente; y ambición, que turba el entendimiento dejándolo a merced del embaucador. Deja a la mente desguarnecida.', prev: 'No entregarse a la ilusión. Confiar en sí mismo antes que en nadie. Ejercitar la discriminación antes de aceptar lo que se dice o propone.', aportes: [{ autor: 'Antonio Damasio', texto: 'La vulnerabilidad al engaño tiene base somática: cuando el sistema de marcadores está desactivado por estrés o exceso de deseo, el organismo no genera señales de alarma.' }, { autor: 'Francisco Varela', texto: 'La propensión al engaño florece cuando el sujeto suspende la observación en primera persona y cede la validación de la realidad a una fuente externa.' }] },
    { id: 2, name: 'Propensión a Adular', desc: 'Se manifiesta en dos tipos: el que adula para asegurarse ventajas; y el que adula para ser adulado. Rebaja el valor ético de quienes se complacen en ella.', prev: 'Buscar siempre la forma más sincera de manifestar la opinión. Recordar que la conciencia del propio valer contribuye con toda eficacia a anularla.', aportes: [{ autor: 'Carl Rogers', texto: 'La adulación es incongruencia aprendida: el sujeto produce lo que el otro quiere escuchar en lugar de expresar lo que genuinamente piensa.' }, { autor: 'Roberto Assagioli', texto: 'La subpersonalidad que adula busca en la aprobación externa la confirmación de valor que no encuentra internamente.' }] },
    { id: 3, name: 'Propensión a la Frivolidad', desc: 'Se manifiesta cuando la vida del individuo carece de incentivos superiores. Es el síntoma precursor de la deficiencia que aparecerá más tarde.', prev: 'Desligarse de ella voluntariamente. Oponer al pensamiento que la sustenta otros de contextura sólida. Lograr que lo importante deje de ser indiferente.', aportes: [{ autor: 'Viktor Frankl', texto: 'La frivolidad como manifestación del vacío existencial: cuando la vida no está orientada por ningún valor, el sujeto llena el espacio con estímulos superficiales.' }, { autor: 'Ken Wilber', texto: 'El paso hacia motivaciones superiores emerge cuando el entorno y las prácticas sostienen valores de mayor complejidad.' }] },
    { id: 4, name: 'Propensión al Disimulo', desc: 'Tendencia a cambiar la faz verdadera de las cosas revistiéndolas de una apariencia. Se muestra lo que no se es ni se tiene.', prev: 'No incurrir en el error de hacer del disimulo un hábito. La autenticidad y la sinceridad son los recursos que desplazan esta tendencia.', aportes: [{ autor: 'Carl Rogers', texto: 'El disimulo como incongruencia crónica: la brecha entre experiencia interna real y lo que se expresa tiene costo psicológico acumulativo.' }, { autor: 'Carl Jung', texto: 'El disimulo es la hipertrofia de la persona: cuando la máscara se vuelve el modo dominante de existir, el sujeto no sabe quién es detrás de ella.' }] },
    { id: 5, name: 'Propensión a Prometer', desc: 'Revela falta de seriedad frente a la responsabilidad. Se promete por darse importancia, para ocultar inoperancia, o para proporcionarse un placer.', prev: 'Reconocer que la palabra empeñada tiene valor. No prometer lo que no se pueda cumplir. Valerse de la prudencia antes de comprometerse.', aportes: [{ autor: 'Daniel Siegel', texto: 'Prometer compulsivamente es regulación emocional disfuncional: se usa la promesa para aliviar tensión sin involucrar los circuitos de planificación a futuro.' }, { autor: 'Viktor Frankl', texto: 'La palabra empeñada es una de las formas más concretas en que el ser humano se proyecta hacia el futuro y se hace responsable de él.' }] },
    { id: 6, name: 'Propensión a Creer', desc: 'Las facultades de la inteligencia se afectan por el adormecimiento temporario de la mente. Su causa real es la ignorancia. Expone al fanatismo.', prev: 'El hombre no debe creer, sino saber. La posesión del conocimiento garantiza la propia libertad. Acostumbrarse a pensar libremente.', aportes: [{ autor: 'Francisco Varela', texto: 'La propensión a creer es clausura epistemológica: el sujeto renuncia a la función validadora de su propia experiencia y la delega en autoridad externa.' }, { autor: 'Ken Wilber', texto: 'Distingue entre fe preracional (creencia acrítica) y fe transracional (que integra el pensamiento crítico sin quedar atrapada en él).' }] },
    { id: 7, name: 'Propensión a la Ilusión', desc: 'La facultad de imaginar exalta la reflexión con proyectos irrealizables. Puede poner en peligro el equilibrio moral y material.', prev: 'Mantener vigilante atención sobre esta tendencia para neutralizar la seducción que lo ilusorio ejerce sobre los sentidos.', aportes: [{ autor: 'Antonio Damasio', texto: 'El sistema de marcadores somáticos genera señales de placer intenso ante la imagen mental del resultado deseado: el cerebro no distingue bien entre promesa vívida y realidad.' }, { autor: 'Roberto Assagioli', texto: 'Distingue entre imaginación creativa (que anticipa posibilidades alcanzables) y fantasía evasiva (que produce satisfacción imaginaria sustituta).' }] },
    { id: 8, name: 'Propensión al Deleite Sensorial', desc: 'Indica principio de relajamiento de la voluntad, disminución de la capacidad para resistir los estímulos pasionales e inhibición espiritual progresiva.', prev: 'Encarar una abstinencia gradual mientras el proceso de evolución consciente ofrece satisfacciones más profundas.', aportes: [{ autor: 'Carl Jung', texto: 'El exceso sensorial como compensación: el sujeto que no encontró satisfacción en el nivel consciente busca en los sentidos una intensidad que llene el vacío.' }, { autor: 'Viktor Frankl', texto: 'La búsqueda compulsiva de placer es frecuentemente huida del vacío existencial. Paradójicamente, cuanto más se persigue, menos satisface.' }] },
    { id: 9, name: 'Propensión al Aislamiento', desc: 'Sobreviene cuando el individuo es atrapado por pensamientos de escepticismo e indiferencia. El aislamiento voluntario endurece los sentimientos.', prev: 'Comprender que la convivencia es tan necesaria al hombre como la movilidad. Buscar activamente el contacto social.', aportes: [{ autor: 'Daniel Siegel', texto: 'El aislamiento crónico no es solo un problema social sino amenaza directa a la salud del sistema nervioso: el cerebro humano es un órgano social.' }, { autor: 'Pierre Teilhard de Chardin', texto: 'El aislamiento contradice la dirección del proceso evolutivo: la materia consciente se mueve hacia formas de unión más complejas.' }] },
    { id: 10, name: 'Propensión a la Exageración', desc: 'La imaginación obra sin el control de las demás facultades. El sujeto tiende a abultar el volumen de las cosas para impresionar.', prev: 'Observar cuán pronto aumenta el número de los que huyen del exagerado. Comprender que la eliminación de esta tendencia genera un estado superior.', aportes: [{ autor: 'Antonio Damasio', texto: 'La exageración tiene base somática: la intensidad emocional se traduce automáticamente en amplificación de los detalles al narrar.' }, { autor: 'Roberto Assagioli', texto: 'Una subpersonalidad que busca en el impacto sobre otros la confirmación de su existencia y valor.' }] },
    { id: 11, name: 'Propensión a lo Fácil', desc: 'La escasa ejercitación de la facultad de pensar inclina al ser hacia lo fácil. Debilita la voluntad e inhibe el ánimo. Es signo evidente de mediocridad.', prev: 'Nunca es conveniente allanar en demasía los pequeños problemas. Las energías que mueven la voluntad se generan a través del esfuerzo.', aportes: [{ autor: 'Viktor Frankl', texto: 'La tensión noológica —la distancia entre lo que uno es y lo que puede llegar a ser— es la condición de la salud; huir hacia lo fácil la destruye.' }, { autor: 'Pierre Teilhard de Chardin', texto: 'El esfuerzo consciente es la forma humana de participar en el impulso de complejización que define el proceso evolutivo.' }] },
    { id: 12, name: 'Propensión al Abandono', desc: 'Tiene por causa la inercia de la mente, la incapacidad de mantener activas las facultades de la inteligencia. Contribuyen la desesperanza y los fracasos reiterados.', prev: 'Tomar gusto a la vida y descubrir las ilimitadas prerrogativas que ofrece. El encauzamiento bajo orientación firme permite el reordenamiento interior.', aportes: [{ autor: 'Viktor Frankl', texto: 'El abandono como pérdida del sentido de futuro. Recuperar aunque sea un pequeño punto de orientación hacia el futuro es suficiente para reactivar la voluntad.' }, { autor: 'Carl Rogers', texto: 'El ambiente de aceptación incondicional actúa directamente: cuando el sujeto experimenta ser aceptado tal como es, el self real comienza a emerger.' }] },
    { id: 13, name: 'Propensión a la Discusión', desc: 'El sujeto que discute porque sí, por afán de oposición, a menudo con intención de dejar mal parado al contrincante.', prev: 'Distinguir entre la discusión estéril y el libre examen constructivo, en el cual los criterios armonizan mediante la observación.', aportes: [{ autor: 'Carl Jung', texto: 'La discusión por oposición es frecuentemente la expresión de la sombra proyectada sobre el interlocutor: no se discute sobre el tema sino sobre lo que el otro representa.' }, { autor: 'Daniel Siegel', texto: 'La discusión combativa activa el sistema nervioso simpático y reduce la actividad del córtex prefrontal: literalmente se pierde acceso a funciones sofisticadas.' }] },
    { id: 14, name: 'Propensión al Desaliento', desc: 'Cunde en el ser por fracasos o reveses reiterados. Es propia de seres moralmente débiles. Invalida la facultad de pensar y oprime la sensibilidad.', prev: 'Apreciar la importancia de librarse cuanto antes. El conocimiento trascendente propicia las soluciones.', aportes: [{ autor: 'Viktor Frankl', texto: 'La "libertad de actitud": incluso cuando las circunstancias no pueden cambiarse, el sujeto conserva la capacidad de elegir cómo relacionarse con ellas.' }, { autor: 'Daniel Siegel', texto: 'El desaliento crónico como estado de hipoactivación que puede revertirse mediante experiencias graduadas de éxito pequeño y verificable.' }] },
    { id: 15, name: 'Propensión a la Desesperación', desc: 'Típica de la inhibición psicológica ante dificultades. Cualquier hecho adverso cobra en su mente exagerado incremento. Ve todos los males como irreparables.', prev: 'Pensar que la crisis podría haber sido diez veces mayor. Vigorizar la vida con el adiestramiento mental y del espíritu.', aportes: [{ autor: 'Viktor Frankl', texto: 'Definida como "sufrimiento sin sentido". El sufrimiento se transforma en cuanto el sujeto encuentra una razón que lo trasciende.' }, { autor: 'Roberto Assagioli', texto: 'Las técnicas de evocación de serenidad a través de la imaginación guiada como acceso a recursos internos que la desesperación hace invisibles.' }] },
    { id: 16, name: 'Propensión a la Desatención', desc: 'Son causantes la holganza mental y el hábito de sumirse en abstracciones estériles. Puede restar al hombre defensas sustrayendo detalles importantes.', prev: 'La atención a todo quehacer no sólo es factor de actividad sino estímulo para el desarrollo de las aptitudes. Asegurar el concurso permanente de la conciencia.', aportes: [{ autor: 'Francisco Varela', texto: 'La atención en primera persona no es estado pasivo sino práctica activa: su calidad determina la calidad del conocimiento que se obtiene de la experiencia.' }, { autor: 'Daniel Siegel', texto: 'La atención entrenada desarrolla y engrosa las regiones prefrontales responsables de la regulación emocional y la consciencia de sí.' }] },
    { id: 17, name: 'Propensión a la Ira', desc: 'Reacción violenta del ánimo producida por motivos que indignan. Sus exteriorizaciones adquieren relieves inconfundibles de irracionalidad.', prev: 'Vigilar con toda tenacidad los pensamientos que tienen preeminencia en la mente.', aportes: [{ autor: 'Antonio Damasio', texto: 'En la ira, la amígdala "secuestra" la corteza prefrontal. El único punto de intervención real está antes de que el secuestro se complete: reconocer las señales somáticas precursoras.' }, { autor: 'Carl Jung', texto: 'La ira recurrente como irrupción de material de la sombra: todo lo rechazado acumula carga energética que descarga ante el estímulo detonador.' }] },
    { id: 18, name: 'Propensión a Confiar en el Azar', desc: 'Inhibe al hombre en el sentido de tomar determinaciones oportunas. Prefiere confiar en temerarios desenlaces que pocas veces resultan favorables.', prev: 'Esperarlo todo de la propia capacidad. Lo futuro jamás debe dejarse en manos del azar.', aportes: [{ autor: 'Viktor Frankl', texto: 'Confiar en el azar es una forma de evasión de la responsabilidad existencial: el sujeto delega en la fortuna lo que es suyo por derecho y obligación.' }, { autor: 'Francisco Varela', texto: 'El conocimiento válido se construye a través de la participación activa del sujeto: confiar en el azar es la renuncia a esa participación.' }] },

<script>
(function(){
  const canvas = document.getElementById('endel-bg');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const N = 28;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function Particle(){
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.r = Math.random()*1.2 + 0.3;
    this.vx = (Math.random()-.5)*0.12; this.vy = (Math.random()-.5)*0.12;
    this.alpha = Math.random()*0.35 + 0.04;
  }
  Particle.prototype.update = function(){
    this.x += this.vx; this.y += this.vy;
    if(this.x < 0) this.x = W; if(this.x > W) this.x = 0;
    if(this.y < 0) this.y = H; if(this.y > H) this.y = 0;
  };

    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`; ctx.fill();
  };
  function animate(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => { p.update(); p.draw(); });
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const d = Math.hypot(particles[i].x-particles[j].x, particles[i].y-particles[j].y);
        if(d < 75){
          ctx.strokeStyle = `rgba(255,255,255,${0.05*(1-d/75)})`;
          ctx.lineWidth = 0.4;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
